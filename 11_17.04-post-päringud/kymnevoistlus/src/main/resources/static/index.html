<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>OOP Kodutöö - Kümnevõistlus</title>
    <style>
        body { font-family: "Times New Roman", Times, serif; margin: 50px; line-height: 1.5; }
        h2 { border-bottom: 1px solid black; }
        .nav { margin-bottom: 20px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .controls { margin-bottom: 15px; background: #f9f9f9; padding: 10px; border: 1px solid #ccc; }
        .pagination { margin-top: 15px; }
        button { cursor: pointer; font-family: serif; border: 1px solid black; background: white; padding: 2px 10px; }
        button:disabled { color: #888; border-color: #888; }
    </style>
</head>
<body>

<h2>Kümnevõistluse tulemuste andmebaas</h2>

<div class="nav">
    <a href="lisa.html">>>> Lisa uus võistleja süsteemi</a>
</div>

<div class="controls">
    <strong>Filtreeri riigi järgi:</strong>
    <input type="text" id="filterCountry" placeholder="nt EST" oninput="loadData(0)">

    <strong style="margin-left: 20px;">Sorteeri:</strong>
    <select id="sortBy" onchange="loadData(0)">
        <option value="totalPoints">Punktisumma</option>
        <option value="name">Nimi</option>
        <option value="country">Riik</option>
    </select>

    <select id="dir" onchange="loadData(0)">
        <option value="desc">Kahanev</option>
        <option value="asc">Kasvav</option>
    </select>
</div>

<table id="resultsTable">
    <thead>
    <tr>
        <th>Nimi</th>
        <th>Riik</th>
        <th>Tulemus (punktid)</th>
    </tr>
    </thead>
    <tbody id="athleteBody"></tbody>
</table>

<div class="pagination">
    <button id="prevBtn">Eelmine lehekülg</button>
    <span id="pageInfo"></span>
    <button id="nextBtn">Järgmine lehekülg</button>
</div>

<script>
    let currentPage = 0;

    async function loadData(page) {
        currentPage = page;
        const country = document.getElementById('filterCountry').value;
        const sortBy = document.getElementById('sortBy').value;
        const dir = document.getElementById('dir').value;

        let url = `/api/results?page=${page}&size=5&sortBy=${sortBy}&direction=${dir}`;
        if(country) url += `&country=${country}`;

        const response = await fetch(url);
        const data = await response.json();

        const tbody = document.getElementById('athleteBody');
        tbody.innerHTML = data.content.map(a => `
            <tr>
                <td>${a.name}</td>
                <td>${a.country}</td>
                <td>${a.totalPoints}</td>
            </tr>
        `).join('');

        document.getElementById('pageInfo').innerText = ` Lehekülg ${data.number + 1} / ${data.totalPages || 1} `;

        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        prevBtn.disabled = data.first;
        nextBtn.disabled = data.last;

        prevBtn.onclick = () => loadData(currentPage - 1);
        nextBtn.onclick = () => loadData(currentPage + 1);
    }

    loadData(0);
</script>
</body>
</html>
